backend:
  name: github
  repo: lelandks/raijtarot_website
  branch: main
  base_url: https://raij-tarot-oauth.lelandks.workers.dev

media_folder: "images"

collections:
  - name: "hero"
    label: "Hero"
    files:
      - label: "Hero"
        name: "hero"
        file: "_data/hero.json"
        fields:
          - { label: "Tagline", name: "tagline", widget: "string", hint: "The bold one-liner displayed under the site title." }

  - name: "testimonials"
    label: "Testimonials"
    files:
      - label: "Testimonials List"
        name: "testimonials"
        file: "_data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Client Name", name: "name", widget: "string" }
              - { label: "Review", name: "text", widget: "text" }
              - { label: "Service", name: "service", widget: "string" }

  - name: "about"
    label: "About Section"
    files:
      - label: "About"
        name: "about"
        file: "_data/about.json"
        fields:
          - { label: "Title Line 1", name: "title_line1", widget: "string" }
          - { label: "Title Line 2", name: "title_line2", widget: "string" }
          - { label: "Quote", name: "quote", widget: "string" }
          - { label: "Paragraph 1", name: "paragraph1", widget: "text" }
          - { label: "Paragraph 2", name: "paragraph2", widget: "text" }
          - label: "Specialty Pills"
            name: "pills"
            widget: "list"
            field: { label: "Specialty", name: "pill", widget: "string" }

  - name: "faq"
    label: "FAQ"
    files:
      - label: "FAQ List"
        name: "faq"
        file: "_data/faq.json"
        fields:
          - label: "Questions"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

  - name: "services"
    label: "Services & Pricing"
    files:
      - label: "Services"
        name: "services"
        file: "_data/services.json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            fields:
              - { label: "Category Name", name: "name", widget: "string" }
              - label: "Services"
                name: "services"
                widget: "list"
                fields:
                  - { label: "Service Name", name: "name", widget: "string" }
                  - { label: "Price ($)", name: "price", widget: "number", value_type: "float" }
                  - { label: "Price Display (leave blank for standard)", name: "price_display", widget: "string", required: false, hint: "Only fill this for range prices e.g. $35 – $150" }
                  - { label: "Duration (optional)", name: "duration", widget: "string", required: false, hint: "e.g. 60 min" }
                  - { label: "Range pricing?", name: "range", widget: "boolean", default: false, required: false }
